name: instrumentum
title: Instrumentum Neovim
version: ~
start_page: ROOT:index.adoc

nav:
  - modules/ROOT/nav.adoc

asciidoc:
  attributes:
    # Page layout
    toclevels: 3
    page-toclevels: 3

    # Keybindings
    leader: '<Space>'
    localleader: '<Space>'

    # Paths
    config-dir: '~/.config/nvim'
    config-backup: '~/.config/nvim.backup'
    lua-dir: 'lua/domus'
    ftplugin-dir: 'ftplugin'
    docs-dir: 'docs'

    # NVIM_APPNAME for side-by-side installs
    appname: 'nvim-domus'
    appname-dir: '~/.config/nvim-domus'

    # Plugin names
    completion-engine: 'blink.cmp'
    fuzzy-finder: 'telescope.nvim'
    file-browser: 'oil.nvim'
    snippet-engine: 'LuaSnip'
    plugin-manager: 'lazy.nvim'
    lsp-installer: 'Mason'

    # Additional plugin names
    treesitter: 'nvim-treesitter'
    debugger: 'nvim-dap'
    text-objects: 'mini.ai'
    terminal: 'toggleterm.nvim'
    database: 'vim-dadbod'
    markdown-preview: 'markdown-preview.nvim'
    session-manager: 'auto-session'
    neovim-version: '0.11+'

    # Repo info
    repo-url: 'https://github.com/EvanusModestus/domus-instrumentum'
    repo-name: 'domus-instrumentum'
